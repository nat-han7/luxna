{% extends "base.html" %}

{% block title %}Unsere Galerie{% endblock %}

{% block header_title %}Galerie{% endblock %}

{% block header_nav %}
<a href="/" style="color: var(--text-main); margin-right: var(--space-3); text-decoration: none; font-weight: 600;">
    <i class="fa-solid fa-house"></i> Home
</a>
{% endblock %}

{% block content %}
    <main style="max-width: 1200px; margin: var(--space-5) auto 0 auto; padding: 0 var(--space-4);">
        <h2 style="font-size: 1.6rem; margin-bottom: var(--space-1); text-align: center;">Unser gemeinsames Album</h2>
        <p style="color: var(--text-muted); text-align: center; margin-bottom: var(--space-5);">Klick auf ein Bild, um unsere Geschichte dahinter zu lesen.</p>
        
        <div class="gallery-grid" id="entries-container">
            <!-- Gallery items are loaded dynamically via index.js -->
        </div>
    </main>
{% endblock %}
